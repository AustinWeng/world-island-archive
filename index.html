<title>世界島管委會資料庫 · 受保護</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8F%9D%EF%B8%8F%3C/text%3E%3C/svg%3E">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;
font-family:-apple-system,"PingFang TC","Noto Sans TC",system-ui,sans-serif;
background:linear-gradient(135deg,#1E3A5F 0%,#2D5A8C 55%,#4A90C2 100%);padding:24px}
.card{width:100%;max-width:390px;background:#fff;border-radius:18px;
box-shadow:0 20px 60px rgba(15,42,68,.35);padding:40px 32px;text-align:center}
.badge{width:56px;height:56px;margin:0 auto 18px;border-radius:14px;background:#1E3A5F;
color:#fff;font-size:28px;display:flex;align-items:center;justify-content:center}
h1{font-size:20px;color:#1E3A5F;font-weight:700;letter-spacing:.5px}
.sub{margin-top:8px;font-size:13.5px;color:#64748b;line-height:1.6}
.field{margin-top:26px;text-align:left}
label{font-size:12.5px;color:#475569;font-weight:600}
input{width:100%;margin-top:7px;padding:13px 15px;font-size:16px;border:1.5px solid #cbd5e1;
border-radius:11px;outline:none;transition:border-color .15s;letter-spacing:2px}
input:focus{border-color:#2D5A8C}
button{width:100%;margin-top:18px;padding:13px;font-size:15px;font-weight:700;color:#fff;
background:#1E3A5F;border:none;border-radius:11px;cursor:pointer;transition:background .15s}
button:hover{background:#2D5A8C}button:disabled{background:#94a3b8;cursor:default}
.status{margin-top:14px;font-size:13px;min-height:18px}
.status.err{color:#dc2626}.status.ok{color:#2D5A8C}
.foot{margin-top:22px;font-size:11.5px;color:#94a3b8;line-height:1.6}
</style>
</head>
<body>
<div class="card">
<div class="badge">&#128274;</div>
<h1>世界島管委會資料庫</h1>
<p class="sub">歷年會議・文件・圖說・照片・附件。<br>內容僅供本社區住戶與委員瀏覽，請輸入密碼。</p>
<div class="field"><label for="pw">密碼</label>
<input id="pw" type="password" inputmode="numeric" autocomplete="off" placeholder="請輸入共用碼" autofocus></div>
<button id="btn">解鎖瀏覽</button>
<div class="status" id="status"></div>
<div class="foot">密碼請見社區公告，或洽管理委員會<br>世界島社區管理委員會</div>
</div>

const b64d=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
const $=id=>document.getElementById(id);
async function unlock(){
  const pw=$("pw").value,st=$("status");
  if(!pw){st.className="status err";st.textContent="請輸入密碼";return;}
  $("btn").disabled=true;st.className="status ok";st.textContent="解密中…";
  try{
    const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
    const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b64d(SALT),iterations:ITER,hash:"SHA-256"},
      km,{name:"AES-GCM",length:256},false,["decrypt"]);
    const gz=await crypto.subtle.decrypt({name:"AES-GCM",iv:b64d(IV)},key,b64d(CT));
    st.textContent="解壓中…";
    const ds=new Response(new Blob([gz]).stream().pipeThrough(new DecompressionStream("gzip")));
    const html=await ds.text();
    try{sessionStorage.setItem("wi_shared_pw",pw);}catch(_){}
    document.open("text/html","replace");document.write(html);document.close();
  }catch(e){$("btn").disabled=false;st.className="status err";st.textContent="密碼錯誤，請重試";$("pw").select();}
}
(function(){try{const s=sessionStorage.getItem("wi_shared_pw");
  if(s){$("pw").value=s;unlock();}}catch(_){}})();
$("btn").addEventListener("click",unlock);
$("pw").addEventListener("keydown",e=>{if(e.key==="Enter")unlock();});
})();
</script>
